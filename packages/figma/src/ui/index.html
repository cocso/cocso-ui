<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8">
    <style>
    * {
      box-sizing: border-box;
      padding: 0;
      margin: 0;
    }

    body {
      padding: 16px;
      font-family:
        Inter, -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      font-size: 12px;
      color: #333;
      background: #fff;
    }

    h1 {
      margin-bottom: 4px;
      font-size: 14px;
      font-weight: 600;
    }

    .subtitle {
      margin-bottom: 16px;
      color: #666;
    }

    button {
      width: 100%;
      height: 36px;
      font-size: 12px;
      font-weight: 500;
      color: #fff;
      cursor: pointer;
      background: #18181b;
      border: none;
      border-radius: 6px;
      transition: background 0.15s;
    }

    button:hover {
      background: #27272a;
    }

    button:disabled {
      cursor: not-allowed;
      background: #a1a1aa;
    }

    .status {
      display: none;
      padding: 10px;
      margin-top: 12px;
      background: #f4f4f5;
      border-radius: 6px;
    }

    .status.visible {
      display: block;
    }

    .status.syncing {
      color: #1d4ed8;
      background: #eff6ff;
    }

    .status.success {
      color: #15803d;
      background: #f0fdf4;
    }

    .status.error {
      color: #b91c1c;
      background: #fef2f2;
    }

    .result-grid {
      display: grid;
      grid-template-columns: 1fr 1fr 1fr;
      gap: 8px;
      margin-top: 8px;
    }

    .result-item {
      padding: 8px;
      text-align: center;
      background: #fff;
      border-radius: 4px;
    }

    .result-item .count {
      font-size: 20px;
      font-weight: 700;
    }

    .result-item .label {
      margin-top: 2px;
      font-size: 10px;
      color: #666;
    }

    .skipped-list {
      margin-top: 12px;
    }

    .skipped-list summary {
      font-size: 11px;
      font-weight: 500;
      color: #666;
      cursor: pointer;
    }

    .skipped-list ul {
      padding-left: 16px;
      margin-top: 4px;
    }

    .skipped-list li {
      margin-bottom: 2px;
      font-size: 11px;
      color: #888;
    }

    .skipped-list li .reason {
      color: #aaa;
    }
    </style>
  </head>
  <body>
    <h1>cocso-ui Design Tokens</h1>
    <p class="subtitle">Sync baseframe tokens to Figma Variables</p>

    <button type="button" id="sync-btn">Sync Tokens</button>

    <div id="status" class="status"><span id="status-text"></span></div>

    <div id="result" style="display:none">
      <div class="result-grid">
        <div class="result-item">
          <div class="count" id="created-count">0</div>
          <div class="label">Created</div>
        </div>
        <div class="result-item">
          <div class="count" id="updated-count">0</div>
          <div class="label">Updated</div>
        </div>
        <div class="result-item">
          <div class="count" id="skipped-count">0</div>
          <div class="label">Skipped</div>
        </div>
      </div>
      <div id="skipped-section" class="skipped-list" style="display:none">
        <details>
          <summary>Skipped tokens</summary>
          <ul id="skipped-list"></ul>
        </details>
      </div>
      <div
        id="errors-section"
        style="display:none; margin-top:8px; color:#b91c1c; font-size:11px;"
      >
        <strong>Errors:</strong>
        <ul id="errors-list" style="padding-left:16px; margin-top:4px;"></ul>
      </div>
    </div>

    <script>
    "use strict";
    const syncBtn = document.getElementById("sync-btn");
    const statusEl = document.getElementById("status");
    const statusText = document.getElementById("status-text");
    const resultEl = document.getElementById("result");

    function onSync() {
      syncBtn.disabled = true;
      statusEl.className = "status visible syncing";
      statusText.textContent = "Syncing tokens...";
      resultEl.style.display = "none";
      parent.postMessage({ pluginMessage: { type: "sync-tokens" } }, "*");
    }

    syncBtn.addEventListener("click", onSync);

    function renderSkippedTokens(skippedTokens) {
      const section = document.getElementById("skipped-section");
      const list = document.getElementById("skipped-list");
      if (skippedTokens && skippedTokens.length > 0) {
        section.style.display = "block";
        list.innerHTML = "";
        for (const token of skippedTokens) {
          const li = document.createElement("li");
          li.textContent = `${token.name} `;
          const span = document.createElement("span");
          span.className = "reason";
          span.textContent = `\u2014 ${token.reason}`;
          li.appendChild(span);
          list.appendChild(li);
        }
      } else {
        section.style.display = "none";
      }
    }

    function renderErrors(errors) {
      const section = document.getElementById("errors-section");
      const list = document.getElementById("errors-list");
      if (errors && errors.length > 0) {
        section.style.display = "block";
        list.innerHTML = "";
        for (const error of errors) {
          const li = document.createElement("li");
          li.textContent = error;
          list.appendChild(li);
        }
      } else {
        section.style.display = "none";
      }
    }

    window.addEventListener("message", (event) => {
      const msg = event.data.pluginMessage;
      if (!msg) {
        return;
      }

      if (msg.type === "sync-start") {
        statusEl.className = "status visible syncing";
        statusText.textContent = "Syncing tokens...";
      }

      if (msg.type === "sync-complete") {
        const r = msg.result;
        syncBtn.disabled = false;
        statusEl.className = "status visible success";
        statusText.textContent = "Sync complete!";
        resultEl.style.display = "block";

        document.getElementById("created-count").textContent = r.created;
        document.getElementById("updated-count").textContent = r.updated;
        document.getElementById("skipped-count").textContent = r.skipped;

        renderSkippedTokens(r.skippedTokens);
        renderErrors(r.errors);
      }

      if (msg.type === "sync-error") {
        syncBtn.disabled = false;
        statusEl.className = "status visible error";
        statusText.textContent = `Error: ${msg.error}`;
      }
    });
    </script>
  </body>
</html>
