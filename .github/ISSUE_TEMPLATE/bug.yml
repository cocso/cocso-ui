name: Bug Report
description: Report a bug in cocso-ui
labels: ["bug"]
body:
  - type: input
    id: title-domain
    attributes:
      label: Domain
      description: "Lowercase identifier (e.g. react, css, baseframe, storybook, website)"
      placeholder: "react"
    validations:
      required: true

  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: Concise description of the bug.
    validations:
      required: true

  - type: textarea
    id: evidence
    attributes:
      label: Evidence
      description: Steps to reproduce, error messages, screenshots, or logs.
    validations:
      required: true

  - type: textarea
    id: current-gap
    attributes:
      label: Current Gap
      description: What is the current (incorrect) behavior?
    validations:
      required: true

  - type: textarea
    id: proposed-scope
    attributes:
      label: Proposed Scope
      description: Suggested fix or investigation direction.
    validations:
      required: false

  - type: textarea
    id: acceptance-criteria
    attributes:
      label: Acceptance Criteria
      description: What must be true for this bug to be considered fixed?
      placeholder: |
        - [ ] ...
    validations:
      required: true

  - type: textarea
    id: out-of-scope
    attributes:
      label: Out of Scope
      description: Anything explicitly excluded from this fix.
    validations:
      required: false
