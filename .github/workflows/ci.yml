name: CI

on:
  push:
    branches:
      - main
      - v1
  pull_request:
    branches:
      - main
      - v1
    types:
      - opened
      - synchronize
      - reopened
      - closed

jobs:
  cleanup-vr-branches:
    name: Cleanup VR Screenshot Branches
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request' && github.event.action == 'closed'
    permissions:
      contents: write
    steps:
      - name: Delete vr-screenshots branches for this PR
        env:
          GITHUB_TOKEN: ${{ github.token }}
          PR_NUMBER: ${{ github.event.number }}
        run: |
          gh api repos/${{ github.repository }}/git/refs \
            --paginate \
            --jq '.[] | select(.ref | startswith("refs/heads/vr-screenshots-'"${PR_NUMBER}"'-")) | .ref' \
          | while read ref; do
              branch="${ref#refs/heads/}"
              echo "Deleting branch: $branch"
              gh api --method DELETE "repos/${{ github.repository }}/git/refs/heads/$branch" || true
            done

  lint:
    name: Lint
    runs-on: ubuntu-latest
    if: github.event.action != 'closed'
    steps:
      - name: Checkout Repo
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '22'

      - name: Setup pnpm
        uses: pnpm/action-setup@v5

      - name: Install Dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint
        run: pnpm run lint

  test:
    name: Test
    runs-on: ubuntu-latest
    if: github.event.action != 'closed'
    permissions:
      contents: read
      pull-requests: write
    steps:
      - name: Checkout Repo
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '22'

      - name: Setup pnpm
        uses: pnpm/action-setup@v5

      - name: Install Dependencies
        run: pnpm install --frozen-lockfile

      - name: Codegen Freshness
        run: |
          pnpm --filter @cocso-ui/recipe build
          pnpm --filter @cocso-ui/codegen generate
          git diff --exit-code packages/codegen/generated/ || (echo "::error::Generated files are stale. Run 'pnpm --filter @cocso-ui/codegen generate' and commit." && exit 1)

      - name: Test with Coverage
        run: pnpm run test:coverage

      - name: Golden Matrix (Figma parity)
        run: pnpm --filter @cocso-ui/figma golden-matrix

      - name: Generate Coverage Report
        if: always()
        run: |
          node << 'EOF'
          const fs = require('fs');
          const cwd = process.cwd();

          function badge(pct) {
            if (pct >= 90) return '🟢';
            if (pct >= 70) return '🟡';
            return '🔴';
          }

          function fmt(v) {
            return `${badge(v.pct)} ${v.pct}%`;
          }

          function load(p) {
            try { return JSON.parse(fs.readFileSync(p, 'utf8')); }
            catch { return null; }
          }

          function fileDetails(coverage, pkgDir) {
            const prefix = `${cwd}/${pkgDir}/`;
            const files = Object.entries(coverage)
              .filter(([k]) => k !== 'total' && k.startsWith(prefix))
              .map(([k, s]) => ({ rel: k.slice(prefix.length), s }))
              .filter(({ rel }) => !rel.endsWith('index.ts') && !rel.includes('.stories.') && !rel.includes('/test/') && !rel.endsWith('.d.ts'))
              .sort((a, b) => a.s.lines.pct - b.s.lines.pct);

            if (files.length === 0) return '';

            const rows = files.map(({ rel, s }) =>
              `| \`${rel}\` | ${fmt(s.statements)} | ${fmt(s.branches)} | ${fmt(s.functions)} | ${fmt(s.lines)} |`
            );

            return [
              '| File | Stmts | Branch | Funcs | Lines |',
              '|------|:-----:|:------:|:-----:|:-----:|',
              ...rows,
            ].join('\n');
          }

          const pkgs = [
            { name: '@cocso-ui/react',     summary: 'packages/react/coverage/coverage-summary.json',     dir: 'packages/react' },
            { name: '@cocso-ui/recipe',    summary: 'packages/recipe/coverage/coverage-summary.json',    dir: 'packages/recipe' },
            { name: '@cocso-ui/codegen',   summary: 'packages/codegen/coverage/coverage-summary.json',   dir: 'packages/codegen' },
            { name: '@cocso-ui/figma',     summary: 'packages/figma/coverage/coverage-summary.json',     dir: 'packages/figma' },
            { name: '@cocso-ui/baseframe', summary: 'ecosystem/baseframe/coverage/coverage-summary.json', dir: 'ecosystem/baseframe' },
          ];

          const summaryRows = pkgs.map(({ name, summary }) => {
            const c = load(summary);
            if (!c) return `| \`${name}\` | — | — | — | — |`;
            const s = c.total;
            return `| \`${name}\` | ${fmt(s.statements)} | ${fmt(s.branches)} | ${fmt(s.functions)} | ${fmt(s.lines)} |`;
          });

          const detailBlocks = pkgs.map(({ name, summary, dir }) => {
            const c = load(summary);
            if (!c) return '';
            const table = fileDetails(c, dir);
            if (!table) return '';
            return [
              `<details>`,
              `<summary><b>${name}</b> — File Coverage</summary>`,
              '',
              table,
              '',
              '</details>',
            ].join('\n');
          }).filter(Boolean);

          const body = [
            '## Test Coverage',
            '',
            '| Package | Statements | Branches | Functions | Lines |',
            '|---------|:----------:|:--------:|:---------:|:-----:|',
            ...summaryRows,
            '',
            ...detailBlocks,
            '',
            `> Updated: ${new Date().toISOString().replace('T', ' ').slice(0, 16)} UTC`,
          ].join('\n');

          fs.writeFileSync('coverage-report.md', body);
          process.stdout.write(body + '\n');
          EOF

      - name: Post Coverage Comment
        if: always() && github.event_name == 'pull_request'
        uses: marocchino/sticky-pull-request-comment@v2
        with:
          header: test-coverage
          path: coverage-report.md

      - name: Write Coverage to Job Summary
        if: always()
        run: cat coverage-report.md >> $GITHUB_STEP_SUMMARY

  icons:
    name: Icon Validation
    runs-on: ubuntu-latest
    if: github.event.action != 'closed'
    steps:
      - name: Checkout Repo
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '22'

      - name: Setup pnpm
        uses: pnpm/action-setup@v5

      - name: Install Dependencies
        run: pnpm install --frozen-lockfile

      - name: Build Icons
        run: pnpm --filter @cocso-ui/icons build

      - name: Validate Icons
        run: pnpm --filter @cocso-ui/icons validate

      - name: Validate Backward Compatibility
        run: pnpm --filter @cocso-ui/icons validate:compat

  build:
    name: Build
    runs-on: ubuntu-latest
    if: github.event.action != 'closed'
    steps:
      - name: Checkout Repo
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '22'

      - name: Setup pnpm
        uses: pnpm/action-setup@v5

      - name: Install Dependencies
        run: pnpm install --frozen-lockfile

      - name: Build
        run: pnpm run build

  visual-regression:
    name: Visual Regression
    runs-on: ubuntu-latest
    if: github.event.action != 'closed'
    permissions:
      contents: write
      pull-requests: write
    steps:
      - name: Checkout Repo
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '22'

      - name: Setup pnpm
        uses: pnpm/action-setup@v5

      - name: Install Dependencies
        run: pnpm install --frozen-lockfile

      - name: Cache Playwright Browsers
        uses: actions/cache@v5
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ hashFiles('pnpm-lock.yaml') }}
          restore-keys: |
            playwright-${{ runner.os }}-

      - name: Install Playwright Chromium
        working-directory: apps/storybook
        run: npx playwright install chromium --with-deps

      - name: Build Storybook
        run: pnpm turbo run build --filter=@cocso-ui/storybook

      - name: Run Visual Regression Tests
        id: vr-test
        continue-on-error: true
        working-directory: apps/storybook
        run: |
          npx serve storybook-static -p 6006 &
          npx wait-on http://localhost:6006 --timeout 60000
          SNAPSHOT_COUNT=$(find __snapshots__ -maxdepth 1 -name "*.png" 2>/dev/null | wc -l)
          if [ "$SNAPSHOT_COUNT" -eq 0 ]; then
            echo "::warning::No baseline snapshots found. Run the 'Update Visual Regression Baselines' workflow to generate them."
            echo "has_baselines=false" >> $GITHUB_OUTPUT
          else
            echo "has_baselines=true" >> $GITHUB_OUTPUT
            pnpm test:visual -- --ci
          fi

      - name: Push Screenshots to Branch
        if: github.event_name == 'pull_request' && steps.vr-test.outputs.has_baselines == 'true'
        continue-on-error: true
        env:
          GITHUB_TOKEN: ${{ github.token }}
          PR_NUMBER: ${{ github.event.number }}
          RUN_ID: ${{ github.run_id }}
        run: |
          BRANCH="vr-screenshots-${PR_NUMBER}-${RUN_ID}"
          SNAPSHOTS="apps/storybook/__snapshots__"

          STAGING=$(mktemp -d)
          mkdir -p "$STAGING/screenshots"

          # before: committed baseline snapshots
          for f in "${SNAPSHOTS}"/*.png; do
            [ -f "$f" ] || continue
            id=$(basename "$f" .png)
            cp "$f" "$STAGING/screenshots/before-${id}.png"
          done

          # after: freshly captured screenshots from this run
          if [ -d "${SNAPSHOTS}/__current__" ]; then
            for f in "${SNAPSHOTS}/__current__"/*.png; do
              [ -f "$f" ] || continue
              id=$(basename "$f" .png)
              cp "$f" "$STAGING/screenshots/after-${id}.png"
            done
          fi

          # diff: generated by jest-image-snapshot on mismatch
          if [ -d "${SNAPSHOTS}/__diff_output__" ]; then
            for f in "${SNAPSHOTS}/__diff_output__"/*.png; do
              [ -f "$f" ] || continue
              name=$(basename "$f" -diff.png)
              cp "$f" "$STAGING/screenshots/diff-${name}.png"
            done
          fi

          # Prevent Vercel from deploying this screenshots-only branch
          echo '{"ignoreCommand":"exit 0"}' > "$STAGING/vercel.json"

          cd "$STAGING"
          git init
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git remote add origin "https://x-access-token:${GITHUB_TOKEN}@github.com/${GITHUB_REPOSITORY}.git"
          git add .
          git commit -m "vr: screenshots for PR #${PR_NUMBER} run ${RUN_ID}"
          git push origin "HEAD:refs/heads/${BRANCH}"

      - name: Generate Visual Regression Report
        if: github.event_name == 'pull_request' && steps.vr-test.outputs.has_baselines == 'true'
        env:
          PR_NUMBER: ${{ github.event.number }}
          RUN_ID: ${{ github.run_id }}
        run: |
          node << 'EOF'
          const fs = require('fs');
          const path = require('path');

          const PR_NUMBER = process.env.PR_NUMBER;
          const RUN_ID = process.env.RUN_ID;
          const REPO = process.env.GITHUB_REPOSITORY;
          const BRANCH = `vr-screenshots-${PR_NUMBER}-${RUN_ID}`;
          const BASE_URL = `https://raw.githubusercontent.com/${REPO}/${BRANCH}/screenshots`;

          const SNAPSHOTS_DIR = 'apps/storybook/__snapshots__';
          const DIFF_DIR = path.join(SNAPSHOTS_DIR, '__diff_output__');

          const allSnapshots = fs.readdirSync(SNAPSHOTS_DIR)
            .filter(f => f.endsWith('.png') && !f.startsWith('.'))
            .sort()
            .map(f => f.replace('.png', ''));

          let diffed = [];
          try {
            diffed = fs.readdirSync(DIFF_DIR)
              .filter(f => f.endsWith('-diff.png'))
              .map(f => f.replace('-diff.png', ''));
          } catch {}

          const changed = allSnapshots.filter(id => diffed.includes(id));
          const unchanged = allSnapshots.filter(id => !diffed.includes(id));

          function formatName(id) {
            return id
              .replace(/^components-/, '')
              .replace(/--/g, ' / ')
              .replace(/-/g, ' ')
              .replace(/\b\w/g, c => c.toUpperCase());
          }

          const lines = ['<!-- cocso-ui-visual-regression -->', '## Visual Regression Report', ''];

          if (changed.length === 0) {
            lines.push(`✅ **All ${allSnapshots.length} snapshot(s) matched — no visual regressions.**`);
          } else {
            lines.push(`⚠️ **${changed.length} of ${allSnapshots.length} screenshot(s) changed:**`, '');
            for (const id of changed) {
              lines.push(`### ${formatName(id)}`, '');
              lines.push('| Before | After | Diff |');
              lines.push('|--------|-------|------|');
              lines.push(`| ![Before](${BASE_URL}/before-${id}.png) | ![After](${BASE_URL}/after-${id}.png) | ![Diff](${BASE_URL}/diff-${id}.png) |`);
              lines.push('');
            }
          }

          if (unchanged.length > 0) {
            const label = changed.length === 0
              ? `${unchanged.length} screenshot(s) — all matching baseline`
              : `${unchanged.length} screenshot(s) unchanged`;
            lines.push('', `<details><summary>${label}</summary>`, '');
            for (const id of unchanged) {
              lines.push(`- ${formatName(id)}`);
            }
            lines.push('', '</details>');
          }

          lines.push('', '---', '*Generated by cocso-ui Visual Regression*');

          fs.writeFileSync('vr-report.md', lines.join('\n'));
          EOF

      - name: Post Visual Regression Comment
        if: github.event_name == 'pull_request' && steps.vr-test.outputs.has_baselines == 'true'
        uses: marocchino/sticky-pull-request-comment@v2
        with:
          header: visual-regression
          path: vr-report.md

      - name: Fail if Visual Regressions Detected
        if: steps.vr-test.outcome == 'failure'
        run: |
          echo "::error::Visual regressions detected. See the PR comment for before/after/diff images."
          exit 1
