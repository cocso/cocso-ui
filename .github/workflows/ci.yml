name: CI

on:
  push:
    branches:
      - main
      - v1
  pull_request:
    branches:
      - main
      - v1

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repo
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '22'

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Install Dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint
        run: pnpm run lint

  test:
    name: Test
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write
    steps:
      - name: Checkout Repo
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '22'

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Install Dependencies
        run: pnpm install --frozen-lockfile

      - name: Test with Coverage
        run: pnpm run test:coverage

      - name: Generate Coverage Report
        if: always()
        run: |
          node << 'EOF'
          const fs = require('fs');

          function load(path) {
            try { return JSON.parse(fs.readFileSync(path, 'utf8')).total; }
            catch { return null; }
          }

          function badge(pct) {
            if (pct >= 90) return '🟢';
            if (pct >= 70) return '🟡';
            return '🔴';
          }

          const pkgs = [
            { name: '@cocso-ui/react',      path: 'packages/react/coverage/coverage-summary.json' },
            { name: '@cocso-ui/baseframe',  path: 'ecosystem/baseframe/coverage/coverage-summary.json' },
          ];

          const rows = pkgs.map(({ name, path }) => {
            const s = load(path);
            if (!s) return `| \`${name}\` | — | — | — | — |`;
            const f = v => `${badge(v.pct)} ${v.pct}%`;
            return `| \`${name}\` | ${f(s.statements)} | ${f(s.branches)} | ${f(s.functions)} | ${f(s.lines)} |`;
          });

          const body = [
            '## 📊 Test Coverage',
            '',
            '| Package | Statements | Branches | Functions | Lines |',
            '|---------|:----------:|:--------:|:---------:|:-----:|',
            ...rows,
            '',
            `> Updated: ${new Date().toISOString().replace('T', ' ').slice(0, 16)} UTC`,
          ].join('\n');

          fs.writeFileSync('coverage-report.md', body);
          EOF

      - name: Post Coverage Comment
        if: always() && github.event_name == 'pull_request'
        uses: marocchino/sticky-pull-request-comment@v2
        with:
          header: test-coverage
          path: coverage-report.md

      - name: Write Coverage to Job Summary
        if: always()
        run: cat coverage-report.md >> $GITHUB_STEP_SUMMARY

  build:
    name: Build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repo
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '22'

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Install Dependencies
        run: pnpm install --frozen-lockfile

      - name: Build
        run: pnpm run build
