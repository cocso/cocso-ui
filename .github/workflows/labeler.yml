name: Labeler

on:
  pull_request_target:
    types: [opened, synchronize, reopened]

permissions:
  contents: read
  pull-requests: write
  issues: write

jobs:
  path-labeler:
    name: Path Labels
    runs-on: ubuntu-latest
    steps:
      - uses: actions/labeler@v5
        with:
          repo-token: ${{ secrets.GITHUB_TOKEN }}
          configuration-path: .github/labeler.yml
          sync-labels: true

  keyword-labeler:
    name: Keyword Labels
    runs-on: ubuntu-latest
    steps:
      - uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const title = context.payload.pull_request.title.toLowerCase().trim();
            const body  = (context.payload.pull_request.body || '').toLowerCase();

            const keywordMap = [
              { prefixes: ['fix!:', 'fix(:'],        label: 'bug'           },
              { prefixes: ['fix:',  'bugfix:'],       label: 'bug'           },
              { prefixes: ['feat!:', 'feat(:'],       label: 'enhancement'   },
              { prefixes: ['feat:', 'feature:'],      label: 'enhancement'   },
              { prefixes: ['docs:', 'doc:'],          label: 'documentation' },
              { prefixes: ['test:', 'tests:'],        label: 'test'          },
              { prefixes: ['ci:',   'ci(:'],          label: 'ci'            },
              { prefixes: ['chore:', 'build:'],       label: 'chore'         },
              { prefixes: ['refactor:', 'refactor(:'],label: 'refactor'      },
              { prefixes: ['security:', 'sec:'],      label: 'security'      },
              { prefixes: ['perf:', 'perf(:'],        label: 'enhancement'   },
              { prefixes: ['deps:', 'bump '],         label: 'dependencies'  },
              { prefixes: ['wip:', 'wip('],           label: 'wip'           },
            ];

            const labelsToAdd = new Set();

            for (const { prefixes, label } of keywordMap) {
              if (prefixes.some(p => title.startsWith(p) || title.includes(p))) {
                labelsToAdd.add(label);
              }
            }

            if (/\w+!:/.test(context.payload.pull_request.title) ||
                body.includes('breaking change') ||
                body.includes('breaking-change')) {
              labelsToAdd.add('breaking-change');
            }

            if (labelsToAdd.size > 0) {
              await github.rest.issues.addLabels({
                owner: context.repo.owner,
                repo:  context.repo.repo,
                issue_number: context.payload.pull_request.number,
                labels: [...labelsToAdd],
              });
              core.info(`Added labels: ${[...labelsToAdd].join(', ')}`);
            }

  size-labeler:
    name: Size Label
    runs-on: ubuntu-latest
    steps:
      - uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const { data: pr } = await github.rest.pulls.get({
              owner: context.repo.owner,
              repo:  context.repo.repo,
              pull_number: context.payload.pull_request.number,
            });

            const total = pr.additions + pr.deletions;

            const SIZE_LABELS = ['size/xs', 'size/s', 'size/m', 'size/l', 'size/xl'];
            const THRESHOLDS  = [
              { max:  10, label: 'size/xs' },
              { max:  50, label: 'size/s'  },
              { max: 200, label: 'size/m'  },
              { max: 500, label: 'size/l'  },
              { max: Infinity, label: 'size/xl' },
            ];

            const target = THRESHOLDS.find(t => total < t.max).label;

            const { data: current } = await github.rest.issues.listLabelsOnIssue({
              owner: context.repo.owner,
              repo:  context.repo.repo,
              issue_number: context.payload.pull_request.number,
            });

            const removeOps = current
              .filter(l => SIZE_LABELS.includes(l.name) && l.name !== target)
              .map(l => github.rest.issues.removeLabel({
                owner: context.repo.owner,
                repo:  context.repo.repo,
                issue_number: context.payload.pull_request.number,
                name: l.name,
              }));
            await Promise.all(removeOps);

            await github.rest.issues.addLabels({
              owner: context.repo.owner,
              repo:  context.repo.repo,
              issue_number: context.payload.pull_request.number,
              labels: [target],
            });

            core.info(`PR size: +${pr.additions}/-${pr.deletions} (${total} lines) → ${target}`);
